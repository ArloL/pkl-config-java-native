name: Main

on:
  push:
  pull_request:
    branches:
    - main
    types:
    - reopened
  schedule:
  - cron: "53 10 20 * *"
permissions: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJSON(github) }}
      run: echo "$GITHUB_CONTEXT"
    - name: Dump job context
      env:
        JOB_CONTEXT: ${{ toJSON(job) }}
      run: echo "$JOB_CONTEXT"
    - name: Dump steps context
      env:
        STEPS_CONTEXT: ${{ toJSON(steps) }}
      run: echo "$STEPS_CONTEXT"
    - name: Dump runner context
      env:
        RUNNER_CONTEXT: ${{ toJSON(runner) }}
      run: echo "$RUNNER_CONTEXT"
    - name: Dump strategy context
      env:
        STRATEGY_CONTEXT: ${{ toJSON(strategy) }}
      run: echo "$STRATEGY_CONTEXT"
    - name: Dump matrix context
      env:
        MATRIX_CONTEXT: ${{ toJSON(matrix) }}
      run: echo "$MATRIX_CONTEXT"
    - name: Dump environment variables
      run: set
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.output.outputs.new_version }}
      build_timestamp: ${{ steps.output.outputs.build_timestamp }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: true
    - name: Bump version and push tag
      id: tag
      if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
      uses: ArloL/calver-tag-action@7edab67e9aa555ddcfc10f3bb7b342506f2ce8ea # v2604.0.106
    - id: output
      env:
        NEW_VERSION: ${{ steps.tag.outputs.new_version }}
      run: |
        echo "new_version=${NEW_VERSION:-$GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
        echo "build_timestamp=$(date --iso-8601=seconds)" >> "${GITHUB_OUTPUT}"
    - name: Make sure build did not change anything
      run: git diff --exit-code
  macos:
    needs: version
    runs-on: macos-latest
    env:
      REVISION: ${{ needs.version.outputs.new_version }}
      BUILD_TIMESTAMP: ${{ needs.version.outputs.build_timestamp }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        cache: maven
        distribution: graalvm
        java-version-file: .tool-versions
    - name: Build with Maven
      run: |
        set -o xtrace
        ./mvnw \
          --batch-mode \
          -Dsha1="${GITHUB_SHA}" \
          -Drevision="${REVISION}" \
          verify
    - name: Make sure build did not change anything
      run: git diff --exit-code
  linux:
    needs: version
    runs-on: ubuntu-latest
    env:
      REVISION: ${{ needs.version.outputs.new_version }}
      BUILD_TIMESTAMP: ${{ needs.version.outputs.build_timestamp }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        cache: maven
        distribution: graalvm
        java-version-file: .tool-versions
    - name: Build with Maven
      run: |
        set -o xtrace
        ./mvnw \
          --batch-mode \
          -Dsha1="${GITHUB_SHA}" \
          -Drevision="${REVISION}" \
          verify
    - name: Make sure build did not change anything
      run: git diff --exit-code
  windows:
    needs: version
    runs-on: windows-latest
    env:
      REVISION: ${{ needs.version.outputs.new_version }}
      BUILD_TIMESTAMP: ${{ needs.version.outputs.build_timestamp }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        cache: maven
        distribution: graalvm
        java-version-file: .tool-versions
    - name: Build with Maven
      run: |
        .\mvnw --batch-mode -Dsha1="$env:GITHUB_SHA" -Drevision="$env:REVISION" verify
    - name: Make sure build did not change anything
      run: git diff --exit-code
  release:
    needs:
    - version
    - macos
    - linux
    - windows
    if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Create Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NEW_VERSION: ${{ needs.version.outputs.new_version }}
      run: |
        gh release create "v${NEW_VERSION}" \
          --title "Release ${NEW_VERSION}"
    - name: Make sure build did not change anything
      run: git diff --exit-code
  deploy:
    needs:
    - version
    - macos
    - linux
    - windows
    if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/heads/dependabot/') }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        cache: maven
        distribution: temurin
        java-version-file: .tool-versions
    - name: Publish to GitHub Packages Apache Maven
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REVISION: ${{ needs.version.outputs.new_version }}
        BUILD_TIMESTAMP: ${{ needs.version.outputs.build_timestamp }}
      run: |
        ./mvnw \
          --batch-mode \
          -Dsha1="${GITHUB_SHA}" \
          -Drevision="${REVISION}" \
          -DaltDeploymentRepository="github::default::https://maven.pkg.github.com/${GITHUB_REPOSITORY}" \
          deploy
    - name: Make sure build did not change anything
      run: git diff --exit-code
  required-status-check:
    name: main.required-status-check
    needs:
    - macos
    - linux
    - windows
    # GitHub Actions skips this job when any of the dependents fail. And skips
    # are considered success in their weird logic. So we always run it and fail
    # ourselves if necessary
    if: always()
    runs-on: ubuntu-latest
    steps:
    - run: echo "Use this job as the required status check of this workflow"
    - name: Check that all jobs were successful
      env:
        RESULTS: ${{ toJSON(needs) }}
      run: |
        echo "$RESULTS" | jq --exit-status 'all(.result == "success")' || exit 1
